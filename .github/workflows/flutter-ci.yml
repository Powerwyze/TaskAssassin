name: Flutter CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  supabase-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check ChatGPT Edge Function
        run: deno check supabase/functions/chatgpt-chat/index.ts

  flutter-web-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Build Android app bundle
        run: flutter build appbundle --release --dart-define=ENABLE_PUSH=false

  flutter-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without codesign
        run: flutter build ios --release --no-codesign --dart-define=ENABLE_PUSH=false
